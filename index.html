<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Polar Bear 🐻‍❄️</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;
  --cream:#fdf8ee;
  --panel:#fff9f2;
  --pink:#f23f7a;
  --teal:#00c9b1;
  --yellow:#ffe033;
  --purple:#7c3aed;
  --orange:#ff6b1a;
  --blue:#2563eb;
  --red:#e5142a;
  --dot:radial-gradient(circle,rgba(0,0,0,.16) 1.5px,transparent 1.5px);
  --cell:36px;
}
body{
  background-color:var(--cream);
  background-image:var(--dot);
  background-size:10px 10px;
  font-family:'DM Sans',sans-serif;
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── AD ── */
#ad-overlay{position:fixed;inset:0;z-index:9999;background:#0a0010;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ad-bg{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,0,100,.04) 2px,rgba(255,0,100,.04) 4px),linear-gradient(135deg,#0a0010,#200040,#000d00);animation:bgPulse 3s ease-in-out infinite}
@keyframes bgPulse{0%,100%{opacity:1}50%{opacity:.8}}
.ad-scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px)}
.ad-content{position:relative;width:min(490px,94vw);background:#fff;border:4px solid #ff003c;box-shadow:0 0 50px rgba(255,0,60,.7),8px 8px 0 #ff003c;overflow:hidden;animation:adShake .12s ease-in-out infinite alternate}
@keyframes adShake{from{transform:translate(0,0)}to{transform:translate(.6px,.4px) rotate(.15deg)}}
.ad-header{background:linear-gradient(90deg,#ff003c,#ff6600,#ff003c);background-size:200% 100%;animation:hSlide 1.8s linear infinite;padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
@keyframes hSlide{from{background-position:0 0}to{background-position:200% 0}}
.ad-header-text{font-family:'Comic Sans MS',cursive;color:#fff;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px}
.ad-close{background:rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.5);color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:bold;transition:background .2s}
.ad-close:hover{background:rgba(255,0,60,.9)}
.ad-body{padding:20px;background:#fff}
.ad-badge{display:inline-block;background:#ff003c;color:#fff;font-size:9px;font-family:'Comic Sans MS',cursive;font-weight:bold;padding:2px 9px;border-radius:2px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ad-headline{font-family:'Comic Sans MS',cursive;font-size:22px;color:#c00;line-height:1.2;margin-bottom:6px}
.ad-sub{font-size:12px;color:#555;margin-bottom:14px;font-family:'Comic Sans MS',cursive}
.ad-image-strip{display:flex;gap:6px;margin-bottom:14px}
.ad-fake-img{flex:1;height:70px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;overflow:hidden}
.ad-fake-img::after{content:'100% REAL';position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:7px;font-family:'Comic Sans MS',cursive;color:#fff;background:rgba(0,0,0,.55);padding:1px}
.img1{background:linear-gradient(135deg,#ff9a9e,#fad0c4)}
.img2{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
.img3{background:linear-gradient(135deg,#fccb90,#d57eeb)}
.ad-testimonial{background:#fffde7;border-left:3px solid #ffd600;padding:8px 10px;margin-bottom:14px;font-size:11px;font-family:'Comic Sans MS',cursive;color:#555;font-style:italic}
.ad-testimonial strong{color:#333}
.ad-features{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.ad-feature{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'Comic Sans MS',cursive;color:#333}
.ad-feature::before{content:'✅';font-size:10px}
.ad-cta{width:100%;background:linear-gradient(90deg,#ff003c,#ff6600);color:#fff;border:none;padding:14px;font-family:'Comic Sans MS',cursive;font-size:16px;font-weight:bold;cursor:pointer;border-radius:4px;text-transform:uppercase;letter-spacing:1px;animation:ctaPulse .8s ease-in-out infinite alternate;box-shadow:0 4px 20px rgba(255,0,60,.5)}
@keyframes ctaPulse{from{transform:scale(1)}to{transform:scale(1.03)}}
.ad-disclaimer{font-size:7px;color:#aaa;margin-top:8px;text-align:center;font-family:Arial,sans-serif;line-height:1.4}

/* ── MAIN ── */
